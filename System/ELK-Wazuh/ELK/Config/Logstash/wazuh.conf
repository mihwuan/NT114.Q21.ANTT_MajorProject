# /etc/logstash/conf.d/wazuh.conf 
input {
  beats {
    port => 5044
    ssl_enabled => true
    ssl_certificate => '/etc/logstash/certs/logstash.crt'
    ssl_key => '/etc/logstash/certs/logstash.key'
    ssl_client_authentication => 'none'
  }
}

filter {
  if [agent][type] == 'filebeat' {
    mutate {
      add_field => { '[@metadata][index_prefix]' => 'wazuh-alerts' }
    }
  }
  # Parse JSON nếu cần
  if [message] =~ /^\{/ {
    json { source => 'message' }
  }
  # Thêm timestamp
  date {
    match => ['timestamp', 'ISO8601']
    target => '@timestamp'
  }
  mutate {
    remove_field => ["host"]
  }
}

output {
  elasticsearch {
    hosts => ['https://localhost:9200']
    user => 'elastic'
    password => 'NnRH6hu*6CL=mjUvTmZr'
    ssl_enabled => true
    cacert => "/etc/logstash/certs/instance.crt"
    ssl_verification_mode => 'none'

    # 1. Đổi tên index khớp chuẩn Wazuh 4.x
    index => 'wazuh-alerts-4.x-%{+YYYY.MM.dd}'

    # 2. THÊM 3 DÒNG TEMPLATE TỪ TÀI LIỆU
    template => "/etc/logstash/templates/wazuh.json"
    template_name => "wazuh"
    template_overwrite => true
  }
}